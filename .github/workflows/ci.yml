name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    name: Backend — Jest unit & API e2e
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: './package-lock.json'
    
    - name: Install Dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      working-directory: ./backend
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"

    - name: Apply Migrations
      run: npx prisma migrate deploy
      working-directory: ./backend
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"

    - name: Backend Type Check
      run: npm run type-check
      working-directory: ./backend

    - name: Backend Lint
      run: npm run lint
      working-directory: ./backend

    - name: Backend unit tests
      run: npm run test
      working-directory: ./backend

    - name: Backend API e2e tests
      run: npm run test:e2e
      working-directory: ./backend
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
        JWT_SECRET: "test-jwt-secret-for-ci-only-32chars"

  frontend-checks:
    name: Frontend — Vitest, lint & build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: './package-lock.json'
    
    - name: Install Dependencies
      run: npm ci

    - name: Frontend Type Check
      run: npm run type-check
      working-directory: ./frontend

    - name: Frontend Lint
      run: npm run lint
      working-directory: ./frontend

    - name: Frontend Unit Tests
      run: npm run test
      working-directory: ./frontend

    - name: Build Next.js
      run: npm run build
      working-directory: ./frontend
      env:
        NEXT_PUBLIC_API_URL: "http://localhost:3000"

  frontend-e2e:
    name: Frontend — Playwright smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      JWT_SECRET: "test-jwt-secret-for-ci-only-32chars"
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
      PLAYWRIGHT_BASE_URL: "http://localhost:3001"
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      E2E_EMAIL: "manager@qafacafe.com"
      E2E_PASSWORD: "password123"

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: './package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      working-directory: ./backend

    - name: Apply Migrations
      run: npx prisma migrate deploy
      working-directory: ./backend

    - name: Seed Database
      run: npm run db:seed
      working-directory: ./backend

    - name: Build Backend
      run: npm run build
      working-directory: ./backend

    - name: Start Backend
      run: |
        npm run start:prod --workspace=backend &
        for i in $(seq 1 60); do
          if curl -sf http://localhost:3000/health > /dev/null; then
            echo "Backend ready"
            exit 0
          fi
          sleep 2
        done
        echo "Backend failed to start"
        exit 1

    - name: Build Frontend
      run: npm run build
      working-directory: ./frontend

    - name: Start Frontend
      run: |
        npm run start --workspace=frontend -- -p 3001 &
        for i in $(seq 1 60); do
          if curl -sf http://localhost:3001/login > /dev/null; then
            echo "Frontend ready"
            exit 0
          fi
          sleep 2
        done
        echo "Frontend failed to start"
        exit 1

    - name: Install Playwright Browser
      run: npx playwright install --with-deps chromium
      working-directory: ./frontend

    - name: Playwright smoke tests
      run: npm run test:e2e
      working-directory: ./frontend
